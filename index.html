<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Imphal Valley School</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:#08140f;color:white}
.hero{min-height:100vh;background:linear-gradient(rgba(0,0,0,.65),rgba(0,0,0,.7)),url('campus.jpg') center/cover no-repeat;display:flex;align-items:center;justify-content:space-between;padding:60px;gap:40px;flex-wrap:wrap}
h1{font-size:72px;line-height:.95;margin:0}
.gold{color:#d9b25f}
.logo-wrap{position:relative}
.ring{position:absolute;inset:-40px;border:2px solid rgba(217,178,95,.5);border-radius:50%;animation:spin 18s linear infinite}
.logo{width:420px;max-width:90vw;animation:float 4s ease-in-out infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes float{50%{transform:translateY(-12px)}}
@media(max-width:768px){h1{font-size:48px}.hero{padding:30px;text-align:center;justify-content:center}}
</style>
</head>
<body>
<section class="hero">
<div>
<h1>Inspiring Excellence.<br><span class="gold">Shaping Tomorrow.</span></h1>
<p>A premium modern school website presentation.</p>
</div>
<div class="logo-wrap">
<div class="ring"></div>
<img src="logo.png" class="logo">
</div>
</section>
</body>
</html>
